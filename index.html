<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arcana">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Deck de Tarot digital completo com 78 cartas, tiragens e diário pessoal">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Arcana — Tarot Digital</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg-deep: #07070f;
    --bg-dark: #0d0d1a;
    --bg-card: #111124;
    --bg-elevated: #161630;
    --gold: #c9a227;
    --gold-light: #e4c55e;
    --gold-dim: #7a6118;
    --gold-glow: rgba(201,162,39,0.15);
    --gold-glow2: rgba(201,162,39,0.3);
    --purple: #6b3fa0;
    --purple-light: #9b6fd4;
    --crimson: #8b1a1a;
    --text-primary: #f0e6c8;
    --text-secondary: #a89060;
    --text-dim: #5a4a2a;
    --border: rgba(201,162,39,0.2);
    --border-bright: rgba(201,162,39,0.5);
    --font-display: 'Cinzel', serif;
    --font-body: 'Crimson Text', Georgia, serif;
    --radius: 12px;
    --radius-card: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 20%, rgba(201,162,39,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 85%, rgba(201,162,39,0.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* LAYOUT */
  #app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 80px);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed;
    bottom: var(--safe-bottom);
    left: 0; right: 0;
    background: rgba(7,7,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + var(--safe-bottom));
    z-index: 100;
  }
  nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  nav button .nav-icon { font-size: 20px; line-height: 1; }
  nav button.active { color: var(--gold); }
  nav button:hover { color: var(--gold-light); background: var(--gold-glow); }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* HEADERS */
  .page-header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.12em;
  }
  .page-header p {
    color: var(--text-secondary);
    font-style: italic;
    font-size: 1.1rem;
    margin-top: 8px;
  }
  .gold-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* CARDS */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  /* BUTTONS */
  .btn {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 12px 20px;
    transition: all 0.25s;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: #0a0810;
    font-weight: 700;
  }
  .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); transform: translateY(-1px); box-shadow: 0 4px 20px var(--gold-glow2); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--gold);
  }
  .btn-outline:hover { background: var(--gold-glow); }
  .btn-sm { padding: 8px 14px; font-size: 0.65rem; }
  .btn-full { width: 100%; }

  /* HOME / SPREAD SELECTION */
  .home-hero {
    text-align: center;
    padding: 40px 0 32px;
  }
  .home-symbol {
    font-size: 5rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px var(--gold-glow2));
  }
  .home-title {
    font-family: var(--font-display);
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .home-subtitle {
    color: var(--text-secondary);
    font-style: italic;
    font-size: 1.15rem;
    margin-top: 12px;
  }

  .spread-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 8px;
  }
  .spread-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .spread-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .spread-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .spread-card:hover::before { opacity: 1; }
  .spread-icon { font-size: 2rem; display: block; margin-bottom: 10px; }
  .spread-name {
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .spread-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-top: 6px;
    font-style: italic;
    line-height: 1.4;
  }
  .spread-count {
    position: absolute;
    top: 10px;
    right: 12px;
    font-family: var(--font-display);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* QUESTION INPUT */
  .question-area {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .question-area label {
    display: block;
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .question-area textarea {
    width: 100%;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 1rem;
    font-style: italic;
    padding: 12px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .question-area textarea:focus { border-color: var(--gold); }
  .question-area textarea::placeholder { color: var(--text-dim); }

  /* TAROT CARD VISUAL */
  .tarot-card-visual {
    width: 90px;
    height: 150px;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .tarot-card-visual:hover { box-shadow: 0 0 25px var(--gold-glow2); }
  .tarot-card-back {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #1a0a2e, #0d0520, #1a0a2e);
    border-radius: 10px;
    border: 1px solid var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .tarot-card-back::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 7px;
  }
  .tarot-card-back::after {
    content: '✦';
    color: var(--gold-dim);
    font-size: 2rem;
    opacity: 0.5;
  }
  .tarot-card-front {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #1e0f3a, #2a1040, #1a0830);
    border-radius: 10px;
    border: 2px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 8px 5px;
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(201,162,39,0.05);
  }
  .card-symbol-big { font-size: 2.2rem; line-height: 1; }
  .card-name-small {
    font-family: var(--font-display);
    font-size: 0.5rem;
    letter-spacing: 0.06em;
    text-align: center;
    color: var(--gold);
    text-transform: uppercase;
    line-height: 1.2;
  }

  /* CARD FLIP ANIMATION */
  .card-flip-container {
    perspective: 600px;
    width: 90px;
    height: 150px;
  }
  .card-flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    transform-style: preserve-3d;
  }
  .card-flip-inner.flipped { transform: rotateY(180deg); }
  .card-flip-inner .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
  }
  .card-flip-inner .card-face-back {
    background: linear-gradient(145deg, #1a0a2e, #0d0520, #1a0a2e);
    border: 1px solid var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .card-flip-inner .card-face-back::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 7px;
  }
  .card-flip-inner .card-face-back::after {
    content: '✦';
    color: var(--gold-dim);
    font-size: 2rem;
    opacity: 0.5;
  }
  .card-flip-inner .card-face-front {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #1e0f3a, #2a1040, #1a0830);
    border: 2px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 8px 5px;
    box-shadow: inset 0 0 20px rgba(201,162,39,0.05);
  }
  .card-face-front.reversed-card {
    transform: rotateY(180deg) rotate(180deg);
  }

  /* SPREAD LAYOUT AREA */
  .spread-area {
    position: relative;
    margin: 24px 0;
  }
  .spread-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .spread-question-display {
    text-align: center;
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 20px;
    font-size: 0.95rem;
  }

  /* Celtic Cross */
  .celtic-cross-layout {
    display: grid;
    grid-template-areas:
      ". pos2 ."
      "pos5 pos1 pos6"
      ". pos3 ."
      ". pos4 ."
      "pos7 pos8 pos9"
      "pos10 . .";
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 340px;
    margin: 0 auto;
  }
  .celtic-cross-layout [data-pos] { position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .celtic-cross-layout [data-pos="1"] { grid-area: pos1; }
  .celtic-cross-layout [data-pos="2"] { grid-area: pos2; }
  .celtic-cross-layout [data-pos="3"] { grid-area: pos3; }
  .celtic-cross-layout [data-pos="4"] { grid-area: pos4; }
  .celtic-cross-layout [data-pos="5"] { grid-area: pos5; }
  .celtic-cross-layout [data-pos="6"] { grid-area: pos6; }
  .celtic-cross-layout [data-pos="7"] { grid-area: pos7; }
  .celtic-cross-layout [data-pos="8"] { grid-area: pos8; }
  .celtic-cross-layout [data-pos="9"] { grid-area: pos9; }
  .celtic-cross-layout [data-pos="10"] { grid-area: pos10; }

  /* Generic spread row */
  .spread-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 8px 0;
  }
  .spread-position {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    max-width: 100px;
  }
  .position-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.3;
  }
  .position-number {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--gold-dim);
    color: #0a0810;
    font-family: var(--font-display);
    font-size: 0.6rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* CARD DETAIL MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    border-bottom: none;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 8px 20px 40px;
    animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1);
    padding-bottom: calc(40px + var(--safe-bottom));
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 20px;
  }
  .modal-card-header {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .modal-card-symbol {
    font-size: 3.5rem;
    line-height: 1;
    min-width: 60px;
    text-align: center;
  }
  .modal-card-info h2 {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .modal-card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .meta-tag {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
  }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section-title {
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .modal-section p { color: var(--text-secondary); font-size: 1rem; line-height: 1.7; }
  .keywords-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .keyword-tag {
    background: var(--gold-glow);
    border: 1px solid var(--gold-dim);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    color: var(--gold-light);
    font-style: italic;
  }
  .reversed-badge {
    background: rgba(139,26,26,0.3);
    border: 1px solid rgba(139,26,26,0.5);
    color: #e08080;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 12px;
  }

  /* READING RESULTS */
  .reading-results {
    margin-top: 24px;
  }
  .reading-card-item {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reading-card-item:hover { border-color: var(--border-bright); }
  .reading-card-item-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .position-chip {
    background: var(--gold-dim);
    color: #0a0810;
    font-family: var(--font-display);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .reading-card-name {
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--gold-light);
    letter-spacing: 0.05em;
  }
  .reading-card-preview {
    color: var(--text-secondary);
    font-size: 0.9rem;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* LIBRARY */
  .library-search {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 12px 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .library-search:focus { border-color: var(--gold); }
  .library-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--gold-glow);
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .library-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .library-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .library-card:hover { border-color: var(--border-bright); transform: translateY(-2px); }
  .library-card-symbol { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  .library-card-name {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.3;
  }
  .library-card-arcana {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }

  /* JOURNAL */
  .journal-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .journal-entry:hover { border-color: var(--border-bright); }
  .journal-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .journal-spread-type {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .journal-date {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .journal-question {
    color: var(--text-secondary);
    font-style: italic;
    font-size: 0.95rem;
    margin-bottom: 8px;
  }
  .journal-cards-preview {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .journal-card-chip {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }
  .empty-state p { font-size: 0.9rem; font-style: italic; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-number {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .top-cards-list { }
  .top-card-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
  }
  .top-card-rank {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--gold-dim);
    font-weight: 700;
    min-width: 24px;
  }
  .top-card-bar-wrap { flex: 1; }
  .top-card-name {
    font-family: var(--font-display);
    font-size: 0.75rem;
    color: var(--text-primary);
    letter-spacing: 0.05em;
  }
  .top-card-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 5px;
  }
  .top-card-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    transition: width 0.5s;
  }
  .top-card-count {
    font-family: var(--font-display);
    font-size: 0.7rem;
    color: var(--text-secondary);
    min-width: 20px;
    text-align: right;
  }

  /* READING COMPLETE */
  .reading-complete-header {
    text-align: center;
    padding: 20px 0 16px;
  }
  .reading-complete-header h2 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--gold);
    letter-spacing: 0.12em;
  }
  .action-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* CONSULTATION */
  .consultation-area {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .consultation-messages {
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 16px;
  }
  .msg-oracle, .msg-user {
    margin-bottom: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .msg-oracle {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 0 12px 12px 12px;
  }
  .msg-oracle .msg-sender {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  .msg-user {
    background: var(--gold-glow);
    border: 1px solid var(--gold-dim);
    color: var(--text-primary);
    text-align: right;
    border-radius: 12px 0 12px 12px;
  }
  .consultation-input-row {
    display: flex;
    gap: 10px;
  }
  .consultation-input {
    flex: 1;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
  }
  .consultation-input:focus { border-color: var(--gold); }

  /* YEAR SPREAD */
  .year-spread-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 16px 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LOADING ANIMATION */
  .card-reveal-animation {
    animation: cardReveal 0.5s ease-out;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(0.8) rotate(-5deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* RESPONSIVE */
  @media (min-width: 600px) {
    .spread-grid { grid-template-columns: repeat(3, 1fr); }
    .library-grid { grid-template-columns: repeat(4, 1fr); }
    .year-spread-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>

    keywords: ["ilusão","subconsciente","medo","intuição profunda"],
    upright: "Ilusão, subconsciênte, medo, confusão, intuição profunda. A Lua ilumina o que está oculto nas sombras. Momento de prestar atenção aos sonhos, medos e intuições mais profundas. Nem tudo é o que parece ser.",
    reversed: "Confusão dissipando, medo liberado, clareza chegando, enganos revelados. Pode indicar que as ilusões estão se dissipando ou que medos profundos estão sendo reconhecidos e processados.",
    element: "Água", planet: "Peixes", symbol: "♓" },
  { id: 19, name: "O Sol", arcana: "major", number: "XIX", suit: null,
    keywords: ["sucesso","vitalidade","alegria","clareza"],
    upright: "Sucesso, vitalidade, alegria, clareza, otimismo, triunfo. O Sol brilha sem ambiguidade — traz luz, calor e vida. Período de grande otimismo, sucesso nos empreendimentos, saúde e alegria genuína.",
    reversed: "Pessimismo, falta de entusiasmo, sucesso temporário, energia baixa. Pode indicar que o brilho interno está temporariamente obscurecido ou que há excessiva modéstia impedindo reconhecer os próprios sucessos.",
    element: "Fogo", planet: "Sol", symbol: "☀" },
  { id: 20, name: "O Julgamento", arcana: "major", number: "XX", suit: null,
    keywords: ["julgamento","absolvição","renovação","chamado"],
    upright: "Julgamento, absolvição, renovação, chamado interior, despertar. O Julgamento convoca para uma avaliação honesta do passado e um renascimento. Momento de atender ao chamado interior, fazer as pazes com o passado e abraçar uma nova versão de si mesmo.",
    reversed: "Autocrítica excessiva, ignorar o chamado, arrependimento, julgamento injusto. Pode indicar que você está sendo muito duro consigo mesmo ou ignorando um chamado importante de transformação.",
    element: "Fogo", planet: "Plutão", symbol: "♇" },
  { id: 21, name: "O Mundo", arcana: "major", number: "XXI", suit: null,
    keywords: ["conclusão","integração","realização","totalidade"],
    upright: "Conclusão, integração, realização, totalidade, sucesso completo. O Mundo representa a conclusão bem-sucedida de um ciclo importante. Sensação de completude, realização de objetivos e integração de todas as experiências vividas.",
    reversed: "Ciclo incompleto, atraso, falta de conclusão, busca da perfeição. Pode indicar que algo importante ainda não foi finalizado ou que há resistência em aceitar a completude do caminho percorrido.",
    element: "Terra", planet: "Saturno", symbol: "♄" },

  // COPAS (1-14)
  { id: 22, name: "Ás de Copas", arcana: "minor", number: "1", suit: "cups",
    keywords: ["novo amor","emoções","intuição","início emocional"],
    upright: "Novo começo emocional, amor abundante, intuição, conexão espiritual. O Ás de Copas transborda com possibilidades emocionais. Abertura do coração para o amor, criatividade emocional e conexão profunda com o divino.",
    reversed: "Amor bloqueado, emoções reprimidas, vazio emocional. Dificuldade em abrir o coração ou conectar-se com os próprios sentimentos.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 23, name: "Dois de Copas", arcana: "minor", number: "2", suit: "cups",
    keywords: ["união","parceria","amor mútuo","conexão"],
    upright: "União, parceria romântica, amor mútuo, conexão profunda, compromisso. Dois corações que se encontram em harmonia. Relacionamento equilibrado baseado em respeito mútuo e afeto genuíno.",
    reversed: "Desequilíbrio no relacionamento, separação, ruptura, incompatibilidade. Pode indicar conflito ou desencontro entre duas pessoas.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 24, name: "Três de Copas", arcana: "minor", number: "3", suit: "cups",
    keywords: ["celebração","amizade","comunidade","alegria"],
    upright: "Celebração, amizade, comunidade, alegria compartilhada, abundância. Momento de festejo com pessoas queridas, conquistas celebradas em grupo e apoio mútuo.",
    reversed: "Excessos, isolamento, triângulo amoroso, fofoca. Cuidado com excesso de festas ou conflitos dentro do grupo.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 25, name: "Quatro de Copas", arcana: "minor", number: "4", suit: "cups",
    keywords: ["contemplação","apatia","reavaliação","descontentamento"],
    upright: "Contemplação, apatia, reavaliação, introspecção, tédio emocional. Período de questionamento interior sobre o que realmente importa. Uma oportunidade pode estar sendo ignorada.",
    reversed: "Renovação de interesse, motivação, aproveitando oportunidades. Saída da letargia e abertura para novas experiências.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 26, name: "Cinco de Copas", arcana: "minor", number: "5", suit: "cups",
    keywords: ["luto","perda","arrependimento","tristeza"],
    upright: "Luto, perda, arrependimento, foco no negativo. Momento de tristeza por algo perdido, mas há ainda copos em pé — o que permanece tem valor.",
    reversed: "Aceitação, seguir em frente, perdão, recuperação. Capacidade de encontrar paz após a perda.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 27, name: "Seis de Copas", arcana: "minor", number: "6", suit: "cups",
    keywords: ["nostalgia","infância","inocência","passado"],
    upright: "Nostalgia, memórias da infância, inocência, presentes do passado. Reconexão com alegrias simples e lembranças que nutrem a alma.",
    reversed: "Preso no passado, ingenuidade, idealização do passado. Dificuldade em avançar por apego a memórias.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 28, name: "Sete de Copas", arcana: "minor", number: "7", suit: "cups",
    keywords: ["ilusão","fantasias","escolhas","desejos"],
    upright: "Ilusões, fantasias, muitas escolhas, sonhos, imaginação. Período de muitas possibilidades — mas cuidado para não se perder em devaneios.",
    reversed: "Clareza, decisão, livre de ilusões, alinhamento. Capacidade de ver as coisas como realmente são e fazer escolhas conscientes.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 29, name: "Oito de Copas", arcana: "minor", number: "8", suit: "cups",
    keywords: ["abandono","busca","partir","decepção"],
    upright: "Abandono do que não serve, busca por significado, partir em jornada espiritual. Coragem de deixar para trás o que não mais satisfaz.",
    reversed: "Medo de partir, retorno, estagnação, apego. Dificuldade em deixar ir situações que já não nutrem.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 30, name: "Nove de Copas", arcana: "minor", number: "9", suit: "cups",
    keywords: ["satisfação","realização","desejo","gratidão"],
    upright: "Satisfação, realização de desejos, gratidão, contentamento. A carta dos desejos realizados — momento de grande satisfação emocional e material.",
    reversed: "Insatisfação, materialismo, desejo excessivo, sonhos não realizados. Apesar das conquistas externas, falta algo internamente.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 31, name: "Dez de Copas", arcana: "minor", number: "10", suit: "cups",
    keywords: ["felicidade","família","harmonia","realização"],
    upright: "Felicidade familiar, harmonia, realização emocional completa, lar. O arco-íris após a chuva — alegria duradoura e relacionamentos harmoniosos.",
    reversed: "Dissonância familiar, valores desalinhados, harmonia perturbada. Tensões no lar ou dificuldades em criar a família harmoniosa desejada.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 32, name: "Pajem de Copas", arcana: "minor", number: "11", suit: "cups",
    keywords: ["curiosidade","mensagem emocional","sonhos","sensibilidade"],
    upright: "Mensageiro emocional, curiosidade, criatividade, sensibilidade. Traz notícias emocionais, um convite para explorar os sentimentos com abertura.",
    reversed: "Imaturidade emocional, manipulação, frivolidade. Pode indicar irresponsabilidade emocional ou um jovem problemático.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 33, name: "Cavaleiro de Copas", arcana: "minor", number: "12", suit: "cups",
    keywords: ["romance","charme","idealismo","proposta"],
    upright: "Romance, charme, idealismo, proposta, chamado do coração. O cavaleiro segue o coração sem hesitar. Convites românticos e propostas que vêm com sinceridade.",
    reversed: "Capricho, ciúme, moodiness, decepções. Romantismo excessivo que pode levar a decepções ou comportamento caprichoso.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 34, name: "Rainha de Copas", arcana: "minor", number: "13", suit: "cups",
    keywords: ["compaixão","intuição","cura","empatia"],
    upright: "Compaixão, intuição, cura, empatia profunda, nutrição emocional. A rainha cuida com sabedoria emocional, intuitiva e amorosa.",
    reversed: "Dependência emocional, insegurança, manipulação emocional. Tendência a absorver emoções dos outros de forma não saudável.",
    element: "Água", planet: null, symbol: "🏆" },
  { id: 35, name: "Rei de Copas", arcana: "minor", number: "14", suit: "cups",
    keywords: ["maturidade emocional","diplomacia","sabedoria","equilíbrio"],
    upright: "Maturidade emocional, diplomacia, sabedoria, equilíbrio entre emoção e razão. Líder que governa com o coração e a mente em harmonia.",
    reversed: "Manipulação emocional, instabilidade, frieza. Pode indicar repressão emocional ou uso das emoções para manipular outros.",
    element: "Água", planet: null, symbol: "🏆" },

  // ESPADAS (1-14)
  { id: 36, name: "Ás de Espadas", arcana: "minor", number: "1", suit: "swords",
    keywords: ["clareza","verdade","pensamento","novos começos mentais"],
    upright: "Clareza mental, verdade, novos começos intelectuais, corte através da confusão. A espada da mente corta o véu das ilusões. Momento de grande clareza e comunicação direta.",
    reversed: "Confusão, injustiça, verdade cruel, caos mental. Falta de clareza ou uso da verdade de forma destrutiva.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 37, name: "Dois de Espadas", arcana: "minor", number: "2", suit: "swords",
    keywords: ["bloqueio","impasse","decisão difícil","negação"],
    upright: "Impasse, decisão difícil, bloqueio mental, equilíbrio precário. A pessoa de olhos vendados recusa-se a ver a verdade. Necessidade de enfrentar a situação e tomar uma decisão.",
    reversed: "Confusão, sobrecarga de informação, decisão inevitável. As vendas estão caindo — é hora de ver e decidir.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 38, name: "Três de Espadas", arcana: "minor", number: "3", suit: "swords",
    keywords: ["tristeza","dor de coração","traição","sofrimento"],
    upright: "Tristeza, dor de coração, traição, sofrimento, separação. A dor é real e precisa ser sentida para ser curada. Reconhecimento honesto do sofrimento.",
    reversed: "Recuperação, perdão, cura de dores antigas. O processo de cura está em andamento após grande sofrimento.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 39, name: "Quatro de Espadas", arcana: "minor", number: "4", suit: "swords",
    keywords: ["descanso","recuperação","contemplação","retiro"],
    upright: "Descanso, recuperação, contemplação, retiro. Após batalhas intensas, o guerreiro precisa descansar. Pausa necessária para restaurar as forças.",
    reversed: "Exaustão, burnout, retorno à ação antes do tempo, inquietação. Dificuldade em descansar ou necessidade urgente de retornar à ação.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 40, name: "Cinco de Espadas", arcana: "minor", number: "5", suit: "swords",
    keywords: ["conflito","derrota","traição","vitória vazia"],
    upright: "Conflito, derrota, vitória vazia, desonra, traição. Vitória conquistada com táticas desonestas ou às custas de relacionamentos importantes.",
    reversed: "Reconciliação, arrependimento, passando pelo conflito. Capacidade de superar conflitos passados e buscar a paz.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 41, name: "Seis de Espadas", arcana: "minor", number: "6", suit: "swords",
    keywords: ["transição","movimento","cura","saindo da turbulência"],
    upright: "Transição, movimento para águas mais calmas, cura gradual, passagem. Saindo de um período difícil em direção a maior tranquilidade.",
    reversed: "Resistência à mudança, bagagem emocional, retorno de problemas. Dificuldade em deixar o passado para trás.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 42, name: "Sete de Espadas", arcana: "minor", number: "7", suit: "swords",
    keywords: ["engano","estratégia","furtividade","evasão"],
    upright: "Engano, estratégia, furtividade, evasão, independência. Às vezes é necessário ser estratégico e sutil para alcançar objetivos.",
    reversed: "Confissão, arrependimento, impostor revelado, verdade à tona. Segredos sendo revelados ou necessidade de encarar a verdade.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 43, name: "Oito de Espadas", arcana: "minor", number: "8", suit: "swords",
    keywords: ["aprisionamento","restrição","pensamentos limitantes","vitimismo"],
    upright: "Aprisionamento mental, restrição, pensamentos limitantes, vitimismo. As restrições são em grande parte criadas pela mente — a liberdade está mais próxima do que parece.",
    reversed: "Libertação, autolibertação, novo ponto de vista, empoderamento. Reconhecimento de que as amarras eram mentais e capacidade de se libertar.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 44, name: "Nove de Espadas", arcana: "minor", number: "9", suit: "swords",
    keywords: ["ansiedade","pesadelos","preocupação","angústia"],
    upright: "Ansiedade, pesadelos, preocupação excessiva, angústia noturna. Os piores medos da mente acordada às 3 da manhã. Muitas vezes a situação não é tão terrível quanto parece.",
    reversed: "Esperança, saída da dificuldade, alívio, fim da preocupação. O alvorecer após a noite mais escura está chegando.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 45, name: "Dez de Espadas", arcana: "minor", number: "10", suit: "swords",
    keywords: ["fim doloroso","traição","colapso","novo amanhecer"],
    upright: "Fim doloroso, traição, colapso, mas também novo amanhecer. O pior já passou — a única direção agora é para cima.",
    reversed: "Resistência ao inevitável, recuperação, sobrevivência. A dificuldade está sendo superada ou há resistência em aceitar um fim necessário.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 46, name: "Pajem de Espadas", arcana: "minor", number: "11", suit: "swords",
    keywords: ["curiosidade","vigilância","pensamento rápido","novidade"],
    upright: "Mente curiosa, vigilância, pensamento rápido, mensagens, novidades. Jovem espírito intelectual pronto para aprender e comunicar.",
    reversed: "Fofoca, insensibilidade, falta de planejamento, impulsividade verbal. Palavras sem filtro que causam danos.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 47, name: "Cavaleiro de Espadas", arcana: "minor", number: "12", suit: "swords",
    keywords: ["ação","ambição","coragem","impulsividade"],
    upright: "Ação rápida, ambição, coragem, determinação, inteligência em movimento. Parte em grande velocidade em direção aos objetivos, às vezes sem pensar nas consequências.",
    reversed: "Impulsividade destrutiva, agressão verbal, impaciência. Ação antes da reflexão causando danos colaterais.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 48, name: "Rainha de Espadas", arcana: "minor", number: "13", suit: "swords",
    keywords: ["independência","julgamento","clareza","comunicação direta"],
    upright: "Independência, julgamento claro, comunicação direta, sabedoria através da experiência. Mente afiada que combina intelecto com experiência de vida.",
    reversed: "Frieza, crueldade, ressentimento, isolamento. Inteligência usada de forma fria e distante.",
    element: "Ar", planet: null, symbol: "⚔" },
  { id: 49, name: "Rei de Espadas", arcana: "minor", number: "14", suit: "swords",
    keywords: ["autoridade intelectual","lógica","clareza","decisão"],
    upright: "Autoridade intelectual, lógica, clareza mental, decisão firme, verdade. Governa com a mente — justo, direto e analítico.",
    reversed: "Manipulação, tirania mental, crueldade, desonestidade. Inteligência usada para controlar ou manipular.",
    element: "Ar", planet: null, symbol: "⚔" },

  // PAUS (1-14)
  { id: 50, name: "Ás de Paus", arcana: "minor", number: "1", suit: "wands",
    keywords: ["inspiração","potencial","novos começos","criatividade"],

    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 51, name: "Dois de Paus", arcana: "minor", number: "2", suit: "wands",
    keywords: ["planejamento","progresso","decisões","expansão"],

  { id: 52, name: "Três de Paus", arcana: "minor", number: "3", suit: "wands",
    keywords: ["expansão","visão","empreendimento","progresso"],

    reversed: "Atrasos inesperados, obstáculos, falta de foresight. Planos que enfrentam dificuldades ou retornam sem sucesso.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 53, name: "Quatro de Paus", arcana: "minor", number: "4", suit: "wands",
    keywords: ["celebração","lar","comunidade","estabilidade"],
    upright: "Celebração, lar, comunidade, estabilidade, festividade. Momento de comemorar conquistas com aqueles que amamos, senso de pertencimento.",
    reversed: "Conflito doméstico, instabilidade no lar, falta de suporte. Tensões que perturbam a harmonia do lar.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 54, name: "Cinco de Paus", arcana: "minor", number: "5", suit: "wands",
    keywords: ["conflito","competição","discordância","caos"],
    upright: "Conflito, competição, discordância, caos produtivo. Diferentes pontos de vista em choque — pode ser desafiador mas também estimulante.",
    reversed: "Evitando conflito, resolução de disputas, encontrando harmonia. Conflitos se resolvendo ou necessidade de evitar confrontos desnecessários.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 55, name: "Seis de Paus", arcana: "minor", number: "6", suit: "wands",
    keywords: ["vitória","reconhecimento","progresso","autoconfiança"],
    upright: "Vitória, reconhecimento público, progresso, autoconfiança, triunfo. O herói retorna vitorioso — momento de celebrar conquistas e receber reconhecimento merecido.",
    reversed: "Ego inflado, queda de poder, falta de reconhecimento. Sucesso que traz arrogância ou vitória que passa despercebida.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 56, name: "Sete de Paus", arcana: "minor", number: "7", suit: "wands",
    keywords: ["defesa","perseverança","desafio","posição"],
    upright: "Defesa da posição, perseverança, desafio, manter o terreno conquistado. Em posição elevada mas sendo desafiado — é necessário defender o que foi conquistado.",
    reversed: "Capitulação, exaustão, rendição, ceder desnecessariamente. Dificuldade em manter a posição ou ceder por cansaço.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 57, name: "Oito de Paus", arcana: "minor", number: "8", suit: "wands",
    keywords: ["movimento rápido","progresso","notícias","alinhamento"],
    upright: "Movimento rápido, progresso acelerado, notícias chegando, alinhamento de forças. Tudo está em movimento — as coisas estão se acelerando em direção ao objetivo.",
    reversed: "Atrasos, frustração, falta de alinhamento, comunicação bloqueada. Forças que deveriam estar alinhadas estão em descompasso.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 58, name: "Nove de Paus", arcana: "minor", number: "9", suit: "wands",
    keywords: ["resiliência","perseverança","testado","guardar forças"],
    upright: "Resiliência, perseverança, defensor guardando forças. Quase lá — apesar dos ferimentos, é necessário continuar. A perseverança será recompensada.",
    reversed: "Exaustão extrema, paranoia, teimosia, desistência. Forças esgotadas ou recusa em descansar quando necessário.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 59, name: "Dez de Paus", arcana: "minor", number: "10", suit: "wands",
    keywords: ["sobrecarga","responsabilidade","fardo","completar"],
    upright: "Sobrecarga, responsabilidade excessiva, fardo, mas quase chegando. Carregando mais do que deveria — mas o destino está próximo.",
    reversed: "Deixar ir, delegação, encontrando soluções para o fardo. Necessidade de redistribuir responsabilidades ou simplificar.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 60, name: "Pajem de Paus", arcana: "minor", number: "11", suit: "wands",
    keywords: ["entusiasmo","exploração","descoberta","potencial"],
    upright: "Entusiasmo, exploração, potencial, mensagem inspiradora. Jovem espírito cheio de energia criativa pronto para novas aventuras.",
    reversed: "Novidade sem substância, falta de direção, energia desperdiçada. Entusiasmo sem foco ou follow-through.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 61, name: "Cavaleiro de Paus", arcana: "minor", number: "12", suit: "wands",
    keywords: ["energia","paixão","aventura","impulsividade"],
    upright: "Energia, paixão, aventura, charme, busca por emoções. Vive intensamente no presente, seguindo a paixão onde ela levar.",
    reversed: "Impulsividade, frustração, aventuras mal planejadas. Energia sem direção causando caos.",
    element: "Fogo", planet: null, symbol: "🔥" },
  { id: 62, name: "Rainha de Paus", arcana: "minor", number: "13", suit: "wands",
    keywords: ["confiança","coragem","paixão","liderança natural"],
    upright: "Confiança, coragem, paixão, liderança natural, magnetismo. Mulher de presença poderosa que inspira com sua energia vital e confiança.",
    reversed: "Insegurança, introversão repentina, ciúme, demandas excessivas. A confiança natural se transformando em comportamento controlador.",
    element: "Fogo", planet: null, symbol: "🔥" },

</script>
<script>
// ===================== STATE =====================
const SPREADS = [
  { id: 'single', name: 'Carta do Dia', icon: '🌟', desc: 'Orientação para o momento presente', count: '1 carta',
    positions: ['A mensagem do momento'] },
  { id: 'three', name: 'Passado · Presente · Futuro', icon: '⏳', desc: 'O fluxo do tempo em três cartas', count: '3 cartas',
    positions: ['Passado','Presente','Futuro'] },
  { id: 'celtic', name: 'Cruz Celta', icon: '✝️', desc: 'Análise profunda de dez perspectivas', count: '10 cartas',
    positions: ['A situação','A influência cruzada','Base / raiz','O passado recente','Possível futuro','Influências externas','Sua atitude','Como os outros veem','Esperanças e medos','O resultado final'] },
  { id: 'horseshoe', name: 'Ferradura', icon: '🧲', desc: 'Sete cartas em arco revelador', count: '7 cartas',
    positions: ['Passado distante','Passado recente','Presente','Influências externas','Expectativas','Caminho recomendado','Resultado provável'] },
  { id: 'relationship', name: 'Relacionamento', icon: '💞', desc: 'A dinâmica entre duas pessoas', count: '7 cartas',
    positions: ['Você agora','A outra pessoa','A conexão entre vocês','O que você quer','O que a outra pessoa quer','O ponto de conflito','O potencial do relacionamento'] },
  { id: 'decision', name: 'Decisão', icon: '⚖️', desc: 'Avaliar dois caminhos distintos', count: '6 cartas',
    positions: ['A situação atual','Caminho A: essência','Caminho A: consequência','Caminho B: essência','Caminho B: consequência','O conselho das cartas'] },
  { id: 'year', name: 'Ano Pessoal', icon: '📅', desc: 'Os doze meses do seu ano', count: '12 cartas',
    positions: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'] },
];

let currentReading = null;
let currentFilter = 'all';

// ===================== STORAGE =====================
function saveReadings(readings) {
  try { localStorage.setItem('arcana_readings', JSON.stringify(readings)); } catch(e) {}
}
function loadReadings() {
  try { return JSON.parse(localStorage.getItem('arcana_readings') || '[]'); } catch(e) { return []; }
}

// ===================== INIT =====================
function init() {
  renderSpreadGrid();
  renderLibrary();
  renderJournal();
  renderStats();
  registerServiceWorker();
}

function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// ===================== NAVIGATION =====================
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  const navBtn = document.getElementById('nav-'+name);
  if (navBtn) navBtn.classList.add('active');
  if (name === 'journal') renderJournal();
  if (name === 'stats') renderStats();
}

// ===================== SPREAD SELECTION =====================
function renderSpreadGrid() {
  const grid = document.getElementById('spread-select-grid');
  grid.innerHTML = SPREADS.map(s => `
    <div class="spread-card" onclick="startReading('${s.id}')">
      <span class="spread-count">${s.count}</span>
      <span class="spread-icon">${s.icon}</span>
      <div class="spread-name">${s.name}</div>
      <div class="spread-desc">${s.desc}</div>
    </div>
  `).join('');
}

// ===================== READING LOGIC =====================
function startReading(spreadId) {
  const spread = SPREADS.find(s => s.id === spreadId);
  const question = document.getElementById('global-question').value.trim();
  const n = spread.positions.length;

  // Shuffle and draw
  const shuffled = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
  const drawn = shuffled.slice(0, n).map(card => ({
    ...card,
    reversed: Math.random() < 0.3,
  }));

  currentReading = { spread, question, cards: drawn, date: new Date().toISOString() };

  showSection('reading');
  renderReading(currentReading);
}

function renderReading(reading) {
  const area = document.getElementById('reading-area');
  const { spread, question, cards } = reading;
  let cardsHtml = '';

  if (spread.id === 'celtic') {
    // 10-position Celtic Cross
    cardsHtml = `<div class="celtic-cross-layout">
      ${cards.map((card, i) => cardPositionHtml(card, i, spread.positions[i], true)).join('')}
    </div>`;
  } else if (spread.id === 'year') {
    cardsHtml = `<div class="year-spread-grid">
      ${cards.map((card, i) => cardPositionHtml(card, i, spread.positions[i], false, true)).join('')}
    </div>`;
  } else {
    cardsHtml = `<div class="spread-row">
      ${cards.map((card, i) => cardPositionHtml(card, i, spread.positions[i])).join('')}
    </div>`;
  }

  area.innerHTML = `
    <div class="reading-complete-header">
      <h2>${spread.icon} ${spread.name}</h2>
      ${question ? `<p style="color:var(--text-secondary);font-style:italic;margin-top:8px;font-size:0.95rem;">"${question}"</p>` : ''}
    </div>

    <div class="spread-area">${cardsHtml}</div>

    <div class="reading-results" id="reading-results-list">
      ${cards.map((card, i) => `
        <div class="reading-card-item" onclick="openCardModal(${card.id}, ${card.reversed})">
          <div class="reading-card-item-header">
            <span class="position-chip">${spread.positions[i]}</span>
            <span class="reading-card-name">${card.name}${card.reversed ? ' ↕' : ''}</span>
          </div>
          <div class="reading-card-preview">${card.reversed ? card.reversed_meaning || card.reversed : card.upright}</div>
        </div>
      `).join('')}
    </div>

    <div class="action-row">
      <button class="btn btn-gold" onclick="saveCurrentReading()">✦ Salvar no Diário</button>
      <button class="btn btn-outline" onclick="openConsultation()">🔮 Consultar Oráculo</button>
      <button class="btn btn-outline btn-sm" onclick="exportPDF()">⬇ PDF</button>
      <button class="btn btn-outline btn-sm" onclick="showSection('home')">← Nova Tiragem</button>
    </div>
  `;

  // Animate cards
  setTimeout(() => {
    document.querySelectorAll('.card-flip-inner').forEach((el, i) => {
      setTimeout(() => el.classList.add('flipped'), i * 200);
    });
  }, 100);
}

function cardPositionHtml(card, index, posLabel, isCeltic = false, isYear = false) {
  const suitSymbol = getSuitSymbol(card);
  const dataPos = isCeltic ? `data-pos="${index+1}"` : '';
  const smallLabel = isYear ? `<div class="position-label" style="font-size:0.55rem">${posLabel}</div>` : '';
  return `
    <div class="spread-position" ${dataPos}>
      <div class="card-flip-container" onclick="openCardModal(${card.id}, ${card.reversed})" style="cursor:pointer">
        <div class="card-flip-inner">
          <div class="card-face card-face-back"></div>
          <div class="card-face card-face-front${card.reversed ? ' reversed-card' : ''}">
            <div class="card-name-small">${card.number}</div>
            <div class="card-symbol-big">${suitSymbol}</div>
            <div class="card-name-small">${card.name.split(' ').slice(-1)[0]}</div>
          </div>
        </div>
      </div>
      ${!isYear ? `<div class="position-label">${posLabel}</div>` : smallLabel}
    </div>
  `;
}

function getSuitSymbol(card) {
  if (card.arcana === 'major') {
    const symbols = {'☿':'☿','☽':'☽','♀':'♀','♂':'♂','♉':'♉','♊':'♊','♋':'♋','♌':'♌','♍':'♍','♎':'♎','♏':'♏','♐':'♐','♑':'♑','♒':'♒','♓':'♓','☀':'☀','♇':'♇','♆':'♆','♃':'♃','♄':'♄'};
    return card.symbol || '✦';
  }
  if (card.suit === 'cups') return '🏆';
  if (card.suit === 'swords') return '⚔';
  if (card.suit === 'wands') return '🔥';
  if (card.suit === 'pentacles') return '⭐';
  return '✦';
}

// ===================== SAVE READING =====================
function saveCurrentReading() {
  if (!currentReading) return;
  const readings = loadReadings();
  readings.unshift({ ...currentReading, id: Date.now() });
  saveReadings(readings);
  showToast('Leitura salva no diário ✦');
  updateStats(currentReading.cards);
}

function updateStats(cards) {
  try {
    const stats = JSON.parse(localStorage.getItem('arcana_stats') || '{}');
    stats.total = (stats.total || 0) + 1;
    stats.reversed = (stats.reversed || 0) + cards.filter(c => c.reversed).length;
    stats.cardCounts = stats.cardCounts || {};
    cards.forEach(c => {
      stats.cardCounts[c.id] = (stats.cardCounts[c.id] || 0) + 1;
    });
    localStorage.setItem('arcana_stats', JSON.stringify(stats));
  } catch(e) {}
}

// ===================== CARD MODAL =====================
function openCardModal(cardId, reversed) {
  const card = TAROT_CARDS.find(c => c.id === cardId);
  if (!card) return;
  const suitSymbol = getSuitSymbol(card);
  const arcanaLabel = card.arcana === 'major' ? 'Arcano Maior' : `Arcano Menor · ${suitName(card.suit)}`;
  document.getElementById('card-modal-body').innerHTML = `
    <div class="modal-card-header">
      <div class="modal-card-symbol">${suitSymbol}</div>
      <div class="modal-card-info">
        <h2>${card.name}</h2>
        ${reversed ? '<span class="reversed-badge">↕ Invertida</span>' : ''}
        <div class="modal-card-meta">
          <span class="meta-tag">${arcanaLabel}</span>
          ${card.number ? `<span class="meta-tag">${card.number}</span>` : ''}
          ${card.element ? `<span class="meta-tag">${card.element}</span>` : ''}
          ${card.planet ? `<span class="meta-tag">${card.planet}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Palavras-chave</div>
      <div class="keywords-list">${card.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">${reversed ? 'Significado Invertido' : 'Significado'}</div>
      <p>${reversed ? card.reversed : card.upright}</p>
    </div>
    ${reversed ? `
    <div class="modal-section">
      <div class="modal-section-title">Significado em Posição Normal</div>
      <p>${card.upright}</p>
    </div>` : `
    <div class="modal-section">
      <div class="modal-section-title">Significado Invertido</div>
      <p>${card.reversed}</p>
    </div>`}
    <div style="height:20px"></div>
  `;
  document.getElementById('card-modal').classList.add('open');
}
function closeCardModal(e) {
  if (e.target === document.getElementById('card-modal')) {
    document.getElementById('card-modal').classList.remove('open');
  }
}

function suitName(suit) {
  const names = { cups:'Copas', swords:'Espadas', wands:'Paus', pentacles:'Ouros' };
  return names[suit] || suit;
}

// ===================== LIBRARY =====================
function renderLibrary() {
  const search = document.getElementById('library-search').value.toLowerCase();
  const filter = currentFilter;
  const grid = document.getElementById('library-grid');
  const cards = TAROT_CARDS.filter(card => {
    const matchFilter = filter === 'all' || 
      (filter === 'major' && card.arcana === 'major') ||
      (filter !== 'major' && card.suit === filter);
    const matchSearch = !search || 
      card.name.toLowerCase().includes(search) || 
      card.keywords.some(k => k.toLowerCase().includes(search));
    return matchFilter && matchSearch;
  });
  grid.innerHTML = cards.map(card => `
    <div class="library-card" onclick="openCardModal(${card.id}, false)">
      <span class="library-card-symbol">${getSuitSymbol(card)}</span>
      <div class="library-card-name">${card.name}</div>
      <div class="library-card-arcana">${card.arcana === 'major' ? 'Maior' : suitName(card.suit)}</div>
    </div>
  `).join('');
}

document.getElementById('library-search').addEventListener('input', renderLibrary);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderLibrary();
  });
});

// ===================== JOURNAL =====================
function renderJournal() {
  const readings = loadReadings();
  const container = document.getElementById('journal-list');
  if (!readings.length) {
    container.innerHTML = `<div class="empty-state">
      <span class="empty-state-icon">📜</span>
      <h3>Nenhuma leitura salva</h3>
      <p>Faça uma tiragem e salve para construir seu diário</p>
    </div>`;
    return;
  }
  container.innerHTML = readings.map(r => `
    <div class="journal-entry" onclick="openJournalEntry('${r.id}')">
      <div class="journal-entry-header">
        <span class="journal-spread-type">${r.spread?.icon || ''} ${r.spread?.name || 'Tiragem'}</span>
        <span class="journal-date">${formatDate(r.date)}</span>
      </div>
      ${r.question ? `<div class="journal-question">"${r.question}"</div>` : ''}
      <div class="journal-cards-preview">
        ${r.cards.slice(0,4).map(c => `<span class="journal-card-chip">${c.name}${c.reversed?' ↕':''}</span>`).join('')}
        ${r.cards.length > 4 ? `<span class="journal-card-chip">+${r.cards.length-4}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function openJournalEntry(id) {
  const readings = loadReadings();
  const r = readings.find(x => x.id == id);
  if (!r) return;
  document.getElementById('journal-modal-body').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-family:var(--font-display);font-size:1.1rem;color:var(--gold);letter-spacing:0.1em">${r.spread?.icon} ${r.spread?.name}</div>
      <div style="font-size:0.8rem;color:var(--text-dim);margin-top:4px">${formatDate(r.date)}</div>
      ${r.question ? `<div style="color:var(--text-secondary);font-style:italic;margin-top:8px">"${r.question}"</div>` : ''}
    </div>
    <div class="gold-divider" style="margin:0 0 16px"></div>
    ${r.cards.map((card, i) => `
      <div class="reading-card-item" onclick="openCardModal(${card.id}, ${card.reversed})" style="margin-bottom:10px">
        <div class="reading-card-item-header">
          <span class="position-chip">${r.spread?.positions?.[i] || `Carta ${i+1}`}</span>
          <span class="reading-card-name">${card.name}${card.reversed ? ' ↕' : ''}</span>
        </div>
        <div class="reading-card-preview">${card.reversed ? card.reversed : card.upright}</div>
      </div>
    `).join('')}
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
      <button class="btn btn-outline btn-sm" onclick="deleteJournalEntry(${r.id})">🗑 Excluir</button>
      <button class="btn btn-outline btn-sm" onclick="exportJournalPDF(${r.id})">⬇ Exportar PDF</button>
    </div>
  `;
  document.getElementById('journal-modal').classList.add('open');
}

function deleteJournalEntry(id) {
  const readings = loadReadings().filter(r => r.id != id);
  saveReadings(readings);
  document.getElementById('journal-modal').classList.remove('open');
  renderJournal();
  showToast('Leitura removida');
}

function closeJournalModal(e) {
  if (e.target === document.getElementById('journal-modal')) {
    document.getElementById('journal-modal').classList.remove('open');
  }
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  } catch { return iso; }
}

// ===================== STATS =====================
function renderStats() {
  const readings = loadReadings();
  const statsRaw = JSON.parse(localStorage.getItem('arcana_stats') || '{}');
  const total = readings.length;
  const totalCards = readings.reduce((s,r) => s + (r.cards?.length || 0), 0);
  const totalReversed = readings.reduce((s,r) => s + (r.cards?.filter(c=>c.reversed).length || 0), 0);
  
  const cardCounts = {};
  readings.forEach(r => r.cards?.forEach(c => {
    cardCounts[c.id] = (cardCounts[c.id] || { count: 0, name: c.name, symbol: getSuitSymbol(c) });
    cardCounts[c.id].count++;
  }));
  
  const topCards = Object.values(cardCounts).sort((a,b) => b.count - a.count).slice(0,7);
  const maxCount = topCards[0]?.count || 1;

  const spreadCounts = {};
  readings.forEach(r => {
    const name = r.spread?.name || 'Tiragem';
    spreadCounts[name] = (spreadCounts[name] || 0) + 1;
  });

  document.getElementById('stats-content').innerHTML = !total ? `
    <div class="empty-state">
      <span class="empty-state-icon">✨</span>
      <h3>Sem dados ainda</h3>
      <p>Faça algumas leituras para ver estatísticas</p>
    </div>
  ` : `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Leituras</div></div>
      <div class="stat-card"><div class="stat-number">${totalCards}</div><div class="stat-label">Cartas tiradas</div></div>
      <div class="stat-card"><div class="stat-number">${totalReversed}</div><div class="stat-label">Invertidas</div></div>
      <div class="stat-card"><div class="stat-number">${totalCards ? Math.round(totalReversed/totalCards*100) : 0}%</div><div class="stat-label">Taxa inv.</div></div>
    </div>
    ${topCards.length ? `
    <div class="panel">
      <div class="panel-title">Cartas mais frequentes</div>
      <div class="top-cards-list">
        ${topCards.map((c,i) => `
          <div class="top-card-item">
            <div class="top-card-rank">${i+1}</div>
            <div class="top-card-bar-wrap">
              <div class="top-card-name">${c.symbol} ${c.name}</div>
              <div class="top-card-bar"><div class="top-card-bar-fill" style="width:${(c.count/maxCount*100)}%"></div></div>
            </div>
            <div class="top-card-count">${c.count}x</div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
    ${Object.keys(spreadCounts).length ? `
    <div class="panel">
      <div class="panel-title">Tiragens realizadas</div>
      ${Object.entries(spreadCounts).map(([name, count]) => `
        <div class="top-card-item">
          <div class="top-card-bar-wrap">
            <div class="top-card-name">${name}</div>
            <div class="top-card-bar"><div class="top-card-bar-fill" style="width:${count/total*100}%"></div></div>
          </div>
          <div class="top-card-count">${count}x</div>
        </div>
      `).join('')}
    </div>` : ''}
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline btn-sm" onclick="if(confirm('Apagar todos os dados?')){localStorage.clear();location.reload();}">🗑 Limpar todos os dados</button>
    </div>
  `;
}

// ===================== CONSULTATION =====================
let consultMessages = [];
function openConsultation() {
  if (!currentReading) return;
  const readingSummary = currentReading.cards.map((c,i) =>
    `${currentReading.spread.positions[i]}: ${c.name}${c.reversed ? ' (invertida)' : ''}`
  ).join(', ');

  consultMessages = [{
    role: 'assistant',
    content: `Estou pronto para ajudar a aprofundar sua leitura. Sua tiragem de ${currentReading.spread.name} revelou: ${readingSummary}. O que você gostaria de explorar?`
  }];

  // Show modal
  document.getElementById('card-modal-body').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-family:var(--font-display);font-size:1rem;color:var(--gold);letter-spacing:0.1em">🔮 Consulta ao Oráculo</div>
    </div>
    <div class="consultation-messages" id="consult-msgs">
      <div class="msg-oracle">
        <div class="msg-sender">Oráculo</div>
        Estou pronto para aprofundar sua leitura. O que você deseja explorar sobre as cartas?
      </div>
    </div>
    <div class="consultation-input-row">
      <input class="consultation-input" id="consult-input" placeholder="Faça sua pergunta..." onkeydown="if(event.key==='Enter')sendConsult()">
      <button class="btn btn-gold btn-sm" onclick="sendConsult()">→</button>
    </div>
  `;
  document.getElementById('card-modal').classList.add('open');
}

async function sendConsult() {
  const input = document.getElementById('consult-input');
  const question = input.value.trim();
  if (!question) return;

  const msgs = document.getElementById('consult-msgs');
  msgs.innerHTML += `<div class="msg-user">${question}</div>`;
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  consultMessages.push({ role: 'user', content: question });

  const typingEl = document.createElement('div');
  typingEl.className = 'msg-oracle';
  typingEl.innerHTML = '<div class="msg-sender">Oráculo</div>Consultando os arcanos...';
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const readingSummary = currentReading.cards.map((c,i) =>
      `Posição "${currentReading.spread.positions[i]}": ${c.name}${c.reversed ? ' (invertida - '+c.reversed.slice(0,80)+'...)' : ' - '+c.upright.slice(0,80)+'...'}`
    ).join('\n');

    const systemPrompt = `Você é um tarólogo intuitivo e sábio que interpreta o Tarot com profundidade e nuance. 
A tiragem atual foi: ${currentReading.spread.name}
Questão: ${currentReading.question || 'leitura aberta'}
Cartas: ${readingSummary}
Responda em português brasileiro de forma poética, profunda e acolhedora. Seja específico às cartas tiradas. Máximo 150 palavras.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: consultMessages
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'As cartas permanecem em silêncio por ora...';
    consultMessages.push({ role: 'assistant', content: reply });
    typingEl.innerHTML = `<div class="msg-sender">Oráculo</div>${reply}`;
  } catch(e) {
    typingEl.innerHTML = '<div class="msg-sender">Oráculo</div>As cartas estão além do alcance agora. Tente novamente.';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

// ===================== PDF EXPORT =====================
function exportPDF() {
  if (!currentReading) return;
  generateReadingPDF(currentReading);
}

function exportReadingPDF(reading) {
  generateReadingPDF(reading);
}

function generateReadingPDF(reading) {
  const { spread, question, cards, date } = reading;
  const content = `ARCANA — TAROT DIGITAL
${'─'.repeat(50)}
Tiragem: ${spread.name}
Data: ${formatDate(date || new Date().toISOString())}
${question ? `Questão: "${question}"` : 'Leitura aberta'}

${'─'.repeat(50)}
CARTAS TIRADAS
${'─'.repeat(50)}
${cards.map((card, i) => `
[${i+1}] ${spread.positions[i].toUpperCase()}
${card.name}${card.reversed ? ' (INVERTIDA)' : ''}
Palavras-chave: ${card.keywords.join(', ')}

${card.reversed ? card.reversed : card.upright}
`).join('\n'+'─'.repeat(50)+'\n')}
${'─'.repeat(50)}
Gerado por Arcana — Tarot Digital`;

  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `arcana-tarot-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exportado com sucesso ✦');
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


function exportJournalPDF(id) {
  const readings = loadReadings();
  const r = readings.find(x => x.id == id);
  if (r) generateReadingPDF(r);
}
